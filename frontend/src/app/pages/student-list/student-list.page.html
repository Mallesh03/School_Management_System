<div class="page-head">
  <div>
    <h1>Students</h1>
    <p>Search, sort, and manage all student records.</p>
  </div>
  <button mat-flat-button color="primary" routerLink="/students/new" *ngIf="authService.hasRole('ADMIN')">
    Add Student
  </button>
</div>

<mat-card class="toolbar-card">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search</mat-label>
    <input matInput [formControl]="searchControl" placeholder="Name, email, department, course">
  </mat-form-field>
</mat-card>

<mat-card class="table-card">
  <div class="table-wrap" *ngIf="page; else loadingState">
    <table mat-table [dataSource]="page.content" matSort (matSortChange)="sortChanged($event)">
      <ng-container matColumnDef="studentId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Student ID</th>
        <td mat-cell *matCellDef="let row">{{ row.studentId }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.firstName }} {{ row.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>

      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Department</th>
        <td mat-cell *matCellDef="let row">{{ row.department }}</td>
      </ng-container>

      <ng-container matColumnDef="course">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Course</th>
        <td mat-cell *matCellDef="let row">{{ row.course }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <div class="actions-cell">
            <button mat-stroked-button color="primary" [routerLink]="['/students', row.id]">View</button>
            <button mat-stroked-button [routerLink]="['/students', row.id, 'attendance']">Attendance</button>
            <button mat-stroked-button [routerLink]="['/students', row.id, 'edit']" *ngIf="authService.hasRole('ADMIN')">Edit</button>
          <button mat-stroked-button color="warn" (click)="remove(row)" [disabled]="deletingId === row.id" *ngIf="authService.hasRole('ADMIN')">
            {{ deletingId === row.id ? 'Deleting...' : 'Delete' }}
          </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [length]="page.totalElements" [pageSize]="page.size" [pageIndex]="page.number" [pageSizeOptions]="[5, 10, 25]" (page)="pageChanged($event)"></mat-paginator>
  </div>

  <ng-template #loadingState>
    <div class="loading">Loading students...</div>
  </ng-template>
</mat-card>
